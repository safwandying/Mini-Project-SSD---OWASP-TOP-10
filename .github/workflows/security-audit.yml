name: Security Audit
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'          # Laravel 12 recommends 8.3+
          extensions: mbstring, mysql, pdo, xml, ctype, json, tokenizer, openssl, hash
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            php artisan key:generate --force
          else
            echo ".env.example not found"
            exit 1
          fi

      - name: Run Composer Audit
        run: |
          echo "=== Running Security Audit ==="
          composer audit
          echo "✓ No vulnerabilities found"

      - name: Run PHPUnit Tests
        run: php artisan test || true

      - name: Run Semgrep Analysis
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Scan for Hardcoded Secrets
        run: |
          echo "=== Checking for hardcoded passwords ==="
          ! grep -rni "password\s*=" app/ --include="*.php" || exit 1
          echo "=== Checking for DB credentials ==="
          ! grep -rni "DB_PASSWORD\|DB_HOST\|DB_DATABASE" app/ --include="*.php" || exit 1
          echo "✓ No hardcoded secrets detected"

      - name: Upload Audit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: .
